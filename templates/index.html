<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediAssist - Diabetes Predictor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
        }
        h1 { text-align: center; color: #667eea; margin-bottom: 10px; }
        p.subtitle { text-align: center; color: #888; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #444; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { opacity: 0.9; }
        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
        .diabetic { background: #ffe0e0; border-left: 5px solid #e53935; }
        .not-diabetic { background: #e0f7e9; border-left: 5px solid #43a047; }
        .result h3 { margin-bottom: 10px; }
        .result p { color: #444; line-height: 1.6; font-size: 14px; }
        .loading { text-align: center; color: #667eea; margin-top: 20px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 MediAssist</h1>
        <p class="subtitle">AI-Powered Diabetes Risk Predictor</p>

        <div class="form-group">
            <label>Age (years)</label>
            <input type="number" id="age" placeholder="e.g. 35" />
        </div>
        <div class="form-group">
            <label>Glucose Level (mg/dL)</label>
            <input type="number" id="glucose" placeholder="e.g. 120" />
        </div>
        <div class="form-group">
            <label>BMI</label>
            <input type="number" id="bmi" placeholder="e.g. 28.5" step="0.1" />
        </div>
        <div class="form-group">
            <label>Blood Pressure (mm Hg)</label>
            <input type="number" id="blood_pressure" placeholder="e.g. 80" />
        </div>
        <div class="form-group">
            <label>Insulin Level (mu U/ml)</label>
            <input type="number" id="insulin" placeholder="e.g. 100" />
        </div>

        <button onclick="predict()">🔍 Analyze My Health</button>

        <div class="loading" id="loading">⏳ Analyzing with AI... please wait</div>

        <div class="result" id="result">
            <h3 id="result-title"></h3>
            <p id="result-text"></p>
        </div>
    </div>

    <script>
        async function predict() {
            const age = document.getElementById('age').value;
            const glucose = document.getElementById('glucose').value;
            const bmi = document.getElementById('bmi').value;
            const blood_pressure = document.getElementById('blood_pressure').value;
            const insulin = document.getElementById('insulin').value;

            if (!age || !glucose || !bmi || !blood_pressure || !insulin) {
                alert('Please fill in all fields!');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';

            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ age, glucose, bmi, blood_pressure, insulin })
            });

            const data = await response.json();
            document.getElementById('loading').style.display = 'none';

            const resultDiv = document.getElementById('result');
            const resultTitle = document.getElementById('result-title');
            const resultText = document.getElementById('result-text');

            if (data.prediction === 1) {
                resultDiv.className = 'result diabetic';
                resultTitle.innerHTML = '⚠️ High Diabetes Risk Detected';
            } else {
                resultDiv.className = 'result not-diabetic';
                resultTitle.innerHTML = '✅ Low Diabetes Risk Detected';
            }

            resultText.innerHTML = data.explanation;
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
